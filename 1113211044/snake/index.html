<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>經典貪食蛇 - 互動遊戲</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen flex flex-col items-center justify-between p-4">

    <header class="w-full max-w-md flex justify-between items-center py-4">
        <a href="../index.html" class="bg-slate-800 hover:bg-slate-700 text-emerald-400 font-medium px-4 py-2 rounded-xl border border-slate-700 transition duration-200 text-sm flex items-center gap-1">
            ← 返回首頁
        </a>
        <span class="text-xs font-bold text-emerald-500 bg-emerald-500/10 px-3 py-1 rounded-full uppercase tracking-wider">互動遊戲類</span>
    </header>

    <main class="flex flex-col items-center my-auto">
        <h1 class="text-3xl font-extrabold text-emerald-400 mb-2 tracking-wide">經典貪食蛇 🐍</h1>
        <p class="text-slate-400 text-sm mb-6">使用鍵盤上的 <span class="text-slate-200 font-bold">↑ ↓ ← →</span> 方向鍵來控制蛇的移動</p>

        <div class="flex gap-8 mb-4 bg-slate-800 px-6 py-3 rounded-2xl border border-slate-700 shadow-lg">
            <div class="text-center">
                <p class="text-xs text-slate-400 uppercase tracking-wider">目前得分</p>
                <p id="score" class="text-2xl font-bold text-white">0</p>
            </div>
            <div class="border-l border-slate-700"></div>
            <div class="text-center">
                <p class="text-xs text-slate-400 uppercase tracking-wider">最高紀錄</p>
                <p id="highScore" class="text-2xl font-bold text-emerald-400">0</p>
            </div>
        </div>

        <div class="relative bg-slate-950 rounded-2xl overflow-hidden border-4 border-slate-800 shadow-2xl">
            <canvas id="gameCanvas" width="400" height="400" class="block"></canvas>
            
            <div id="gameOverScreen" class="hidden absolute inset-0 bg-slate-950/80 backdrop-blur-sm flex flex-col items-center justify-center transition-all duration-300">
                <p class="text-red-500 font-black text-4xl mb-2 tracking-wider">GAME OVER</p>
                <p class="text-slate-300 mb-6">撞到牆壁或自己囉！</p>
                <button id="restartBtn" class="bg-emerald-500 hover:bg-emerald-600 text-slate-950 font-bold px-6 py-3 rounded-xl shadow-lg transform active:scale-95 transition duration-150">
                    再試一次
                </button>
            </div>
        </div>
    </main>

    <footer class="text-slate-600 text-xs py-4 text-center">
        使用 HTML5 Canvas 與 JavaScript 邏輯驅動
    </footer>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const highScoreElement = document.getElementById('highScore');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const restartBtn = document.getElementById('restartBtn');

        const gridSize = 20; 
        const tileCount = canvas.width / gridSize; 
        
        let snake = [];
        let food = { x: 0, y: 0 };
        let dx = gridSize; 
        let dy = 0;        
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let gameInterval;
        let isGameOver = false;

        highScoreElement.textContent = highScore;

        function initGame() {
            snake = [
                { x: gridSize * 5, y: gridSize * 5 },
                { x: gridSize * 4, y: gridSize * 5 },
                { x: gridSize * 3, y: gridSize * 5 }
            ];
            dx = gridSize;
            dy = 0;
            score = 0;
            scoreElement.textContent = score;
            isGameOver = false;
            gameOverScreen.classList.add('hidden');
            generateFood();
            
            if (gameInterval) clearInterval(gameInterval);
            gameInterval = setInterval(updateGame, 120); 
        }

        function generateFood() {
            food.x = Math.floor(Math.random() * tileCount) * gridSize;
            food.y = Math.floor(Math.random() * tileCount) * gridSize;
            
            snake.forEach(part => {
                if (part.x === food.x && part.y === food.y) {
                    generateFood();
                }
            });
        }

        function updateGame() {
            if (isGameOver) return;

            moveSnake();

            if (checkCollision()) {
                endGame();
                return;
            }

            // 【已修正】移除了原本會報錯的 checkFoodConsumption(); 行動
            drawGame();
        }

        function moveSnake() {
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };
            snake.unshift(head); 
            
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreElement.textContent = score;
                generateFood();
            } else {
                snake.pop(); 
            }
        }

        function checkCollision() {
            const head = snake[0];

            if (head.x < 0 || head.x >= canvas.width || head.y < 0 || head.y >= canvas.height) {
                return true;
            }

            for (let i = 1; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) {
                    return true;
                }
            }
            return false;
        }

        function endGame() {
            isGameOver = true;
            clearInterval(gameInterval);
            gameOverScreen.classList.remove('hidden');

            if (score > highScore) {
                highScore = score;
                highScoreElement.textContent = highScore;
                localStorage.setItem('snakeHighScore', highScore);
            }
        }

        function drawGame() {
            ctx.fillStyle = '#020617'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.strokeStyle = '#1e293b';
            ctx.lineWidth = 0.5;
            for (let i = 0; i < tileCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }

            ctx.fillStyle = '#ef4444';
            ctx.beginPath();
            let radius = gridSize / 2;
            ctx.arc(food.x + radius, food.y + radius, radius - 2, 0, 2 * Math.PI);
            ctx.fill();

            snake.forEach((part, index) => {
                ctx.fillStyle = index === 0 ? '#34d399' : '#10b981';
                ctx.beginPath();
                // 為了防範舊瀏覽器相容性，這裡加個簡單的安全機制
                if (ctx.roundRect) {
                    ctx.roundRect(part.x + 1, part.y + 1, gridSize - 2, gridSize - 2, 4);
                } else {
                    ctx.rect(part.x + 1, part.y + 1, gridSize - 2, gridSize - 2);
                }
                ctx.fill();
            });
        }

        window.addEventListener('keydown', e => {
            if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].includes(e.key)) {
                e.preventDefault();
            }

            switch(e.key) {
                case 'ArrowUp':
                    if (dy === 0) { dx = 0; dy = -gridSize; }
                    break;
                case 'ArrowDown':
                    if (dy === 0) { dx = 0; dy = gridSize; }
                    break;
                case 'ArrowLeft':
                    if (dx === 0) { dx = -gridSize; dy = 0; }
                    break;
                case 'ArrowRight':
                    if (dx === 0) { dx = gridSize; dy = 0; }
                    break;
            }
        });

        restartBtn.addEventListener('click', initGame);
        initGame();
    </script>
</body>
</html>
